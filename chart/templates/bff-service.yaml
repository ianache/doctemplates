apiVersion: v1
kind: Service
metadata:
  name: {{ include "docmanagement.fullname" . }}-bff
  labels:
    {{- include "docmanagement.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff
spec:
  type: {{ .Values.bff.service.type }}
  ports:
    - port: {{ .Values.bff.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "docmanagement.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bff
