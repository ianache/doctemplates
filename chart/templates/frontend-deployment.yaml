apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docmanagement.fullname" . }}-frontend
  labels:
    {{- include "docmanagement.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "docmanagement.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "docmanagement.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5173
              protocol: TCP
          env:
            - name: VITE_API_BASE_URL
              value: {{ .Values.frontend.apiBaseUrl | quote }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
